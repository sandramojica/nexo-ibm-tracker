<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO – IBM Objectives</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; font-size: 14px; line-height: 1.6; background: #f7f8fa; color: #1f2328; }
  .page { max-width: 760px; margin: 0 auto; padding: 24px 16px 48px; }

  .header { background: #1f2328; color: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 24px; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .ibm-logo { font-size: 22px; font-weight: 700; letter-spacing: -1px; color: #3b82d4; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .demo-badge { background: #7c5cd8; color: #fff; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; margin-left: auto; }
  .profile-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .chip { background: rgba(255,255,255,0.1); border-radius: 4px; padding: 3px 10px; font-size: 12px; color: #c9d1d9; }

  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .summary-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px 16px; text-align: center; }
  .summary-card .val { font-size: 28px; font-weight: 700; color: #3b82d4; }
  .summary-card .lbl { font-size: 11px; color: #57606a; margin-top: 2px; }

  .loading { text-align: center; padding: 60px; color: #57606a; font-size: 15px; }
  .error-box { background: #fff1f0; border: 1px solid #ffa39e; border-radius: 8px; padding: 16px; color: #a8071a; margin-bottom: 16px; }

  .group-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #57606a; margin: 20px 0 8px; border-left: 3px solid #3b82d4; padding-left: 8px; }

  .obj-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 10px; }
  .obj-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .obj-id { font-size: 11px; font-weight: 700; color: #3b82d4; background: #eff6ff; border-radius: 4px; padding: 2px 6px; white-space: nowrap; }
  .obj-title { font-size: 13px; font-weight: 600; flex: 1; }
  .obj-pct { font-size: 18px; font-weight: 700; white-space: nowrap; }
  .good { color: #15803d; }
  .mid  { color: #b45309; animation: blink-yellow 1.6s step-start -1.2s infinite; }
  .low  { color: #dc2626; animation: blink-red 0.8s step-start infinite; }

  .progress-bar { height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; }
  .fill-good { background: #16a34a; } .fill-mid { background: #d97706; } .fill-low { background: #dc2626; }

  .obj-target { font-size: 11px; color: #57606a; margin-bottom: 8px; }
  .tools { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tool-link { font-size: 11px; background: #f7f8fa; border: 1px solid #e5e7eb; border-radius: 4px; padding: 2px 8px; color: #3b82d4; text-decoration: none; }

  .suggestions { background: #f7f8fa; border-radius: 6px; padding: 10px 12px; margin-top: 6px; }
  .section-title { font-size: 11px; font-weight: 700; color: #57606a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
  .tip { font-size: 12px; color: #1f2328; padding: 2px 0; display: flex; gap: 6px; }
  .tip::before { content: "•"; color: #3b82d4; flex-shrink: 0; }

  .courses { margin-top: 10px; }
  .course-item { font-size: 12px; padding: 3px 0; display: flex; align-items: baseline; gap: 6px; }
  .course-item a { color: #3b82d4; text-decoration: none; }
  .hrs { font-size: 10px; color: #57606a; background: #e5e7eb; border-radius: 3px; padding: 1px 5px; }

  .alert-box { border-radius: 5px; padding: 8px 12px; margin-top: 8px; font-size: 12px; font-weight: 600; }
  .CRITICAL { background: #fff1f0; border: 1px solid #ffa39e; color: #a8071a; animation: blink-red 0.8s step-start infinite; }
  .WARNING  { background: #fffbe6; border: 1px solid #ffe58f; color: #874d00; animation: blink-yellow 1.6s step-start -1.2s infinite; }
  .OK       { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }

  @keyframes blink-red {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px 3px rgba(220,38,38,0.9); }
    50%       { opacity: 0; box-shadow: none; }
  }
  @keyframes blink-yellow {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px 2px rgba(234,179,8,0.7); }
    50%       { opacity: 0; box-shadow: none; }
  }
  .blink-bulb { animation: blink-yellow 1.6s step-start -2.0s infinite; }

  .footer { text-align: center; margin-top: 40px; padding-top: 16px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #57606a; }

  /* === ACCESO RÁPIDO === */
  .quick-access { margin-bottom: 24px; }
  .qa-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #57606a; margin-bottom: 10px; border-left: 3px solid #3b82d4; padding-left: 8px; }
  .qa-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .qa-btn { display: block; text-decoration: none; border-radius: 8px; padding: 14px 12px; text-align: center; color: #fff; }
  .qa-btn-yl { background: #1d4ed8; }
  .qa-btn-sf { background: #15803d; }
  .qa-btn-tr  { background: #7c3aed; }
  .qa-btn-mhp { background: #b45309; }
  .qa-icon  { font-size: 22px; display: block; margin-bottom: 4px; }
  .qa-name  { font-size: 13px; font-weight: 700; display: block; }
  .qa-desc  { font-size: 10px; opacity: .8; display: block; margin-top: 2px; line-height: 1.3; }
  .qa-arrow { display: inline-block; margin-top: 8px; font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 2px 10px; }
</style>
</head>
<body>
<div class="page">
  <div id="app"><div class="loading">Cargando tus objetivos...</div></div>
</div>

<script>
async function loadDashboard() {
  const app = document.getElementById('app');
  try {
    const [objRes, profRes] = await Promise.all([
      fetch('/api/objectives'),
      fetch('/api/profile'),
    ]);
    const { objectives, demo } = await objRes.json();
    const profile = await profRes.json();
    render(app, objectives, profile, demo);
  } catch (e) {
    app.innerHTML = `<div class="error-box">Error al cargar el dashboard: ${e.message}</div>`;
  }
}

function pctClass(p) { return p >= 95 ? 'good' : p >= 70 ? 'mid' : 'low'; }
function fillClass(p) { return p >= 95 ? 'fill-good' : p >= 70 ? 'fill-mid' : 'fill-low'; }

function render(app, objectives, profile, demo) {
  const total  = objectives.length;
  const onMeta = objectives.filter(o => o.pct >= 95).length;
  const attn   = objectives.filter(o => o.pct < 70).length;

  const groups = {};
  objectives.forEach(o => {
    if (!groups[o.group]) groups[o.group] = [];
    groups[o.group].push(o);
  });

  let html = `
    <div class="header">
      <div class="header-top">
        <span class="ibm-logo">IBM</span>
        <h1>Objectives Tracker</h1>
        ${demo ? '<span class="demo-badge">DEMO</span>' : ''}
      </div>
      <div class="profile-row">
        <span class="chip">${profile.name || 'Sandra Milena Mojica Duarte'}</span>
        <span class="chip">${profile.role || 'Analista Contable'} · Banda ${profile.band || '4'}</span>
        <span class="chip">${profile.profession || 'Contadora Pública'}</span>
        <span class="chip">${profile.practice || 'Consulting'} · ${profile.specialization || 'R2R/P2P/O2C'}</span>
      </div>
    </div>

    <div class="quick-access">
      <div class="qa-title">Acceso R&#225;pido a Plataformas IBM</div>
      <div class="qa-grid">
        <a class="qa-btn qa-btn-yl" href="https://yourlearning.ibm.com" target="_blank" rel="noopener noreferrer">
          <span class="qa-icon">&#128218;</span>
          <span class="qa-name">Your Learning</span>
          <span class="qa-desc">Cursos, badges y trainings</span>
          <span class="qa-arrow">Ir ahora &#8594;</span>
        </a>
        <a class="qa-btn qa-btn-sf" href="https://sf-wz-prd-p2-4snxii8t.workzonehr.cfapps.us10.hana.ondemand.com/site#workzone-home" target="_blank" rel="noopener noreferrer">
          <span class="qa-icon">&#127919;</span>
          <span class="qa-name">SuccessFactors</span>
          <span class="qa-desc">Objetivos, feedback y reflections</span>
          <span class="qa-arrow">Ir ahora &#8594;</span>
        </a>
        <a class="qa-btn qa-btn-tr" href="https://time.ibm.com/week" target="_blank" rel="noopener noreferrer">
          <span class="qa-icon">&#9203;</span>
          <span class="qa-name">Time Recording</span>
          <span class="qa-desc">Registro de horas y timesheets semanales</span>
          <span class="qa-arrow">Ir ahora &#8594;</span>
        </a>
        <a class="qa-btn qa-btn-mhp" href="https://w3.ibm.com/services/tools/mysa/app/#/login" target="_blank" rel="noopener noreferrer">
          <span class="qa-icon">&#128202;</span>
          <span class="qa-name">My Hours Plan</span>
          <span class="qa-desc">Asignaci&#243;n y utilizaci&#243;n</span>
          <span class="qa-arrow">Ir ahora &#8594;</span>
        </a>
      </div>
    </div>

    <div class="summary">
      <div class="summary-card"><div class="val">${total}</div><div class="lbl">Objetivos totales</div></div>
      <div class="summary-card"><div class="val good">${onMeta}</div><div class="lbl">En meta (≥95%)</div></div>
      <div class="summary-card"><div class="val low">${attn}</div><div class="lbl">Requieren atención</div></div>
    </div>
  `;

  for (const [group, items] of Object.entries(groups)) {
    html += `<div class="group-label">${group}</div>`;
    items.forEach(o => {
      const pc = pctClass(o.pct);
      const fc = fillClass(o.pct);
      html += `
        <div class="obj-card">
          <div class="obj-header">
            <span class="obj-id">${o.id}</span>
            <span class="obj-title">${o.title}</span>
            <span class="obj-pct ${pc}">${o.pct}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill ${fc}" style="width:${o.pct}%"></div></div>
          <div class="obj-target">${o.target}</div>
          <div class="tools">
            ${(o.tools || []).map(t => `<a class="tool-link" href="${t.url}" target="_blank">${t.label}</a>`).join('')}
          </div>
      `;

      if (o.hoursAlert) {
        html += `<div class="alert-box ${o.hoursAlert.level}">⏱ ${o.hoursAlert.message}</div>`;
      }

      if (o.suggestions && o.suggestions.length) {
        // Separar sugerencias limpias de las que contienen URLs de cursos (→ "...")
        const cleanTips   = o.suggestions.filter(s => !s.startsWith('→'));
        const courseTips  = o.suggestions.filter(s => s.startsWith('→'));
        if (cleanTips.length) {
          html += `<div class="suggestions"><div class="section-title">Sugerencias</div>
            ${cleanTips.map(s => `<div class="tip">${s}</div>`).join('')}
          </div>`;
        }
        // courseTips se incluyen dentro del desplegable de cursos (ver abajo)
        o._courseTips = courseTips;
      }

      if (o.recommendedCourses && o.recommendedCourses.length) {
        const top5 = o.recommendedCourses.slice(0, 5);
        const rest  = o.recommendedCourses.slice(5);
        const courseRow = c => `
          <div class="course-item">
            <a href="${c.url}" target="_blank">${c.displayName || c.nameEs || c.name}</a>
            <span class="hrs">${c.hours} h</span>
          </div>`;
        const extraTipsHtml = (o._courseTips || []).length
          ? `<div class="suggestions" style="margin-top:8px;margin-bottom:4px;">
              ${o._courseTips.map(s => `<div class="tip">${s}</div>`).join('')}
             </div>`
          : '';
        html += `<div class="courses">
          <div class="section-title" style="color:#7c5cd8;margin-top:8px">📚 Cursos recomendados para tu perfil</div>
          ${top5.map(courseRow).join('')}
          ${(rest.length > 0 || extraTipsHtml) ? `
          <details style="margin-top:6px;">
            <summary style="cursor:pointer;display:inline-block;background:#7c5cd8;color:#fff;border-radius:6px;padding:4px 14px;font-size:11px;font-weight:700;list-style:none;user-select:none;">
              + Ver ${rest.length} cursos más
            </summary>
            <div style="margin-top:6px;">
              ${extraTipsHtml}
              ${rest.map(courseRow).join('')}
            </div>
          </details>` : ''}
        </div>`;
      }

      html += `</div>`;
    });
  }

  html += `<div class="footer">Made with IBM Bob</div>`;
  app.innerHTML = html;
}

loadDashboard();
</script>
</body>
</html>
